name: Docker Autoupdate (yt-dlp)

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-autoupdate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4

      - name: Bootstrap
        run: apt-get update -qq && apt-get install -y -q curl git jq

      - name: Resolve registry target
        id: registry
        run: |
          SERVER_URL="${{ github.server_url }}"
          HOST="${SERVER_URL#https://}"
          HOST="${HOST#http://}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          if [ "$HOST" = "github.com" ]; then
            REGISTRY="ghcr.io"
          else
            REGISTRY="$HOST"
          fi
          echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${OWNER}/${REPO}" >> "$GITHUB_OUTPUT"

      - name: Resolve latest yt-dlp version from GitHub Releases
        id: ytdlp
        run: |
          version=$(curl -s "https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest" \
            | jq -r '.tag_name | ltrimstr("v")')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        run: |
          echo "${{ secrets.CR_TOKEN }}" | docker login "${{ steps.registry.outputs.registry }}" \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Check if version tag already exists
        id: check
        run: |
          TAG="${{ steps.registry.outputs.image }}:autoupdate-ytdlp-${{ steps.ytdlp.outputs.version }}"
          if docker manifest inspect "$TAG" > /dev/null 2>&1; then
            echo "build_needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "build_needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push autoupdate tags
        if: steps.check.outputs.build_needed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.registry.outputs.image }}:autoupdate
            ${{ steps.registry.outputs.image }}:autoupdate-ytdlp-${{ steps.ytdlp.outputs.version }}
            ${{ steps.registry.outputs.image }}:autoupdate-${{ github.run_number }}
          labels: |
            org.opencontainers.image.title=TafForge
            org.opencontainers.image.description=Autoupdate image with newest yt-dlp
            org.opencontainers.image.version=yt-dlp-${{ steps.ytdlp.outputs.version }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          build-args: |
            YTDLP_VERSION=${{ steps.ytdlp.outputs.version }}
